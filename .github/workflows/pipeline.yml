name: Template CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff
        run: ruff check .
      - name: Bandit
        run: bandit -r src/ -ll

  tests:
    needs: lint-and-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          ENCRYPTION_KEY: "1IPOL1Pj1M2H2slMVr9P9x7xQ8TF9OH8D8A4vvO0stU="
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=85

  docker-smoke:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t secure-pipeline-template .
