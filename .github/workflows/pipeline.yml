name: Secure-CI-Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # GATE 1: STATIC ANALYSIS & SECURITY
  lint-and-shield:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Tools
        run: pip install ruff bandit
        
      - name: Code Cleanliness (Ruff)
        run: ruff check .
        
      - name: Security Audit (Bandit)
        ##run: bandit -r . -ll # Only fail on medium/high severity
        run: bandit -r src/ -v

  # GATE 2: LEGAL CHECKS
  legal-licenses-checks:
    needs: lint-and-shield  # 🛑 Don't run tests if code is messy/insecure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' #saves time per run
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
          
      - name: License Compliance Check
        run: |
          pip-licenses --summary
          pip-licenses --allow-only "MIT" "MIT License" "Apache Software License" "Apache-2.0" "BSD-2-Clause" "Apache-2.0 OR BSD-2-Clause" "Python" --partial-match

  # GATE 3: LOGIC & COVERAGE
  logic-and-coverage:
    needs: legal-licenses-checks  # 🛑 Don't run tests if libraries cannot be used
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' #saves time per run
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
          
      - name: Run Tests with 100% Coverage
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=src --cov-report=term-missing --cov-fail-under=100

      - name: Generate HTML Report
        run: pytest --cov=src --cov-report=html

      - name: Upload Coverage Result
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: htmlcov/
